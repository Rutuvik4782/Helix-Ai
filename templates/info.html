<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} - Helix AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-manrope { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-black text-white antialiased overflow-x-hidden selection:bg-orange-500/30 selection:text-orange-200">

    <!-- Background (simplified) -->
    <div class="fixed inset-0 -z-10 bg-black">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900 via-black to-black opacity-50"></div>
        <div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20 mix-blend-overlay"></div>
    </div>

    <!-- Navigation -->
    <div class="fixed flex w-full z-50 pt-6 px-4 top-0 justify-center">
        <nav class="flex items-center justify-between w-full max-w-5xl bg-zinc-900/50 backdrop-blur-md border border-white/10 rounded-full px-6 py-3">
            <a href="/" class="text-base font-medium tracking-tight text-white font-manrope">Helix AI</a>
            <a href="/" class="text-sm font-medium text-zinc-400 hover:text-white transition-colors">Back to Home</a>
        </nav>
    </div>

    <!-- Main Content -->
    <main class="min-h-screen pt-32 pb-20 px-6 max-w-4xl mx-auto">
        <div class="animate-fade-in-up">
            <h1 class="text-4xl md:text-5xl font-medium tracking-tight font-manrope mb-8 text-transparent bg-clip-text bg-gradient-to-b from-white to-white/60">
                {{ page_title }}
            </h1>
            
            <div class="prose prose-invert prose-lg max-w-none text-zinc-400 leading-relaxed space-y-6 font-light">
                {{ content | safe }}
            </div>
        </div>
    </main>

    <!-- Footer (Simplified) -->
    <footer class="w-full border-t border-white/5 py-8 text-center text-zinc-600 text-sm">
        &copy; 2026 Helix AI. All rights reserved.
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
